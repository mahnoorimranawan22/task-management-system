<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskPro | Secure Login Portal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/auth.css">
</head>
<body>
    <div class="bg-gradient bg-gradient-1"></div>
    <div class="bg-gradient bg-gradient-2"></div>

    <div class="auth-wrapper">
        <div class="glass-card auth-container">
            <div class="auth-header text-center">
                <a href="index.html" class="logo justify-center">
                    <i class="fa-solid fa-layer-group"></i> <span>TaskPro</span>
                </a>
                <h2>Welcome Back</h2>
                <p class="auth-subtitle">Verify user access signature to enter dashboard environments</p>
            </div>

            <!-- Security Auth Input Management Form Container -->
            <form id="login-form" class="auth-form">
                <div class="form-group">
                    <label for="email"><i class="fa-regular fa-envelope"></i> Email Address Location</label>
                    <input type="email" id="email" required placeholder="name@domain.com" autocomplete="email">
                </div>
                <div class="form-group">
                    <label for="password"><i class="fa-solid fa-lock"></i> Passphrase Token Verification</label>
                    <input type="password" id="password" required placeholder="••••••••" autocomplete="current-password">
                </div>
                <button type="submit" class="btn-primary btn-full" id="submit-btn">
                    <span>Authorize Session</span> <i class="fa-solid fa-key"></i>
                </button>
            </form>

            <div class="auth-footer text-center">
                <p>New user initialization required? <a href="register.html">Instantiate Identity Profile</a></p>
            </div>
        </div>
    </div>

    <div id="toast-container" class="toast-container"></div>

    <!-- Application Architecture Core Processing Operations Script Tags Hierarchy -->
    <script src="js/utils.js"></script>
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
